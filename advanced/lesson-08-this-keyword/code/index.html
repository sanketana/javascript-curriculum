<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget Workshop — Stopwatch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Widget Workshop</h1>
    <p>Session 8 — the <code>this</code> keyword</p>
  </header>

  <main>
    <div id="time">0s</div>
    <div class="controls">
      <button id="start">Start</button>
      <button id="stop">Stop</button>
      <button id="reset">Reset</button>
    </div>
    <p class="hint">Open the console (F12) too — the <code>this</code> demos print there.</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
